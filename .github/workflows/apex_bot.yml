name: APEX_V8_SKYNET

on:
  workflow_dispatch:
  schedule:
    - cron: '15 20 * * 1-5'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python Master_Engine.py
